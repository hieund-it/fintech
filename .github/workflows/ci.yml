name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # --- .NET Backend ---
  build-dotnet:
    name: .NET Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  # --- Python Data Service ---
  build-python:
    name: Python Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/vnstock-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  # --- React Frontend ---
  build-react:
    name: React Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

      - name: Run tests
        run: npm test

  # --- Docker smoke test ---
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [build-dotnet, build-python, build-react]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=vnstock_ci
          POSTGRES_USER=vnstock
          POSTGRES_PASSWORD=ci_password_placeholder
          JWT_SECRET=ci_jwt_secret_placeholder_32chars!!
          EOF

      - name: Build Docker images
        run: docker compose build --parallel

      - name: Verify images built
        run: docker compose images
